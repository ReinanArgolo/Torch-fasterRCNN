# Config de treinamento apontando para o dataset em new_whales_rcnn/
project_root: "."

data:
  images:
    train_dir: "new_whales_rcnn/images/Train"
    val_dir: "new_whales_rcnn/images/Validation"
    test_dir: "new_whales_rcnn/images/Test"
  annotations:
    train_json: "new_whales_rcnn/annotations/instances_Train.json"
    val_json: "new_whales_rcnn/annotations/instances_Validation.json"
    test_json: "new_whales_rcnn/annotations/instances_Test.json"

training:
  epochs: 30
  batch_size: 2
  lr: 0.002
  momentum: 0.9
  weight_decay: 0.0005
  lr_step_size: 10
  lr_gamma: 0.5
  num_workers: 1
  seed: 42
  amp: true
  sample_vis_count: 4
  sample_vis_thresh: 0.1
  eval_map_every: 1
  transforms:
    resize:
      min_size: 800
      max_size: 1600
    hflip_p: 0.5
    short_sizes: [800, 896, 1024]
    max_size: 1600
    color_jitter: { p: 0.7, brightness: 0.25, contrast: 0.25, saturation: 0.25, hue: 0.03 }
    use_iou_crop: false
    min_iou: 0.3

model:
  name: "fasterrcnn_resnet50_fpn_v2"
  pretrained: yes
  num_classes: 2
  params:
    anchor_sizes: [[16], [32], [64], [128], [256]]
    rpn_pre_nms_top_n_train: 4000
    rpn_pre_nms_top_n_test: 2000
    rpn_post_nms_top_n_train: 4000
    rpn_post_nms_top_n_test: 2000
    box_nms_thresh: 0.6
    box_detections_per_img: 300

output:
  dir: "outputs"
  experiment: "fasterrcnn_new_whales"
  save_every: 1
  resume: "resume"

early_stopping:
  enabled: true
  monitor: "val_loss"
  eval_map_every: 1
  mode: null
  min_delta: 0.0001
  patience: 10
  restore_best_weights: true
  prefer_val_mAP: true

cross_validation:
  enabled: true
  folds: 5
