# Example training configuration for Faster R-CNN
# Paths
project_root: "."
data:
  images:
    train_dir: "datasets/images/Train"
    val_dir: "datasets/images/Validation"
    test: "datasets/images/test"
  annotations:
    train_json: "datasets/annotations/instances_Train.json"
    val_json: "datasets/annotations/instances_Validation.json"
    test_json: "datasets/annotations/test"


# Training
training:
  epochs: 5
  batch_size: 2
  lr: 0.005
  transforms:
    resize:
      min_size: 800
      max_size: 1600
    hflip_p: 0.5
    # Multiscale mais alto para preservar detalhe (objetos pequenos/distantes)
    short_sizes: [800, 896, 1024]
    max_size: 1600
    color_jitter: { p: 0.7, brightness: 0.25, contrast: 0.25, saturation: 0.25, hue: 0.03 }
    use_iou_crop: false
    min_iou: 0.3

# Model
model:
  name: "fasterrcnn_resnet50_fpn_v2"
  pretrained: yes
  num_classes: 2  # background + whale
  # Ajustes opcionais focados em objetos pequenos/muito próximos.
  # Estes parâmetros são lidos por modules/model_factory.py via get_model(..., **model.params)
  params:
    # Âncoras menores (5 níveis do FPN). Padrão é ~[32,64,128,256,512].
    # Aqui reduzimos para aumentar recall de objetos pequenos.
    anchor_sizes: [[16], [32], [64], [128], [256]]
    # Mais propostas no RPN (pode aumentar custo/VRAM/tempo, mas ajuda em cenas congestionadas)
    rpn_pre_nms_top_n_train: 4000
    rpn_pre_nms_top_n_test: 2000
    rpn_post_nms_top_n_train: 4000
    rpn_post_nms_top_n_test: 2000
    # NMS um pouco mais permissivo para não suprimir objetos próximos
    box_nms_thresh: 0.6
    # Permitir mais detecções por imagem (útil quando há muitos objetos)
    box_detections_per_img: 300

# Checkpointing / logging
output:
  dir: "outputs"
  experiment: "fasterrcnn_test"
  save_every: 1
  resume: "resume"  # path to checkpoint to resume from

# Early stopping to avoid overfitting (configured for fine-tuning)
early_stopping:
  enabled: true
  # monitor: choose metric to monitor. Recommended: 'val_loss' (default) or 'val_mAP'.
  # The Trainer will also accept legacy names like 'map' or 'mAP' and map them to 'val_mAP'.
  monitor: "val_loss"
  eval_map_every: 1
  # mode is auto-detected from monitor: 'min' for losses, 'max' for mAP-like metrics
  # If you explicitly want to override, set mode: 'min' or 'max'
  mode: null
  # minimum change to qualify as improvement (default 1e-4)
  min_delta: 0.0001
  # patience in epochs (default 10)
  patience: 10
  # whether to restore best weights at the end of training
  restore_best_weights: true
  # prefer val_mAP automatically if available (will switch monitor to 'val_mAP')
  prefer_val_mAP: true

cross_validation:
  enabled: true     # habilita CV
  folds: 5          # número de folds
